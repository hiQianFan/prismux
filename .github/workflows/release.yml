name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare release
    runs-on: macos-latest
    outputs:
      release: ${{ steps.prepare.outputs.release }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release version
        id: prepare
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk '
            $0 == "[workspace.package]" { in_workspace = 1; next }
            /^\[/ && $0 != "[workspace.package]" { in_workspace = 0 }
            in_workspace && /^version = / {
              gsub(/"/, "", $3)
              print $3
              exit
            }
          ' Cargo.toml)"
          if [[ -z "${version}" ]]; then
            echo "Could not read workspace package version from Cargo.toml" >&2
            exit 1
          fi

          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - "$tag" <<'PY'
          import re
          import sys
          from pathlib import Path

          tag = sys.argv[1]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^##\s+{re.escape(tag)}(?:\s+-\s+[^\n]+)?\s*$"
              rf"(?P<body>.*?)(?=^##\s+|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(text)
          if not match:
              raise SystemExit(f"CHANGELOG.md does not contain a section for {tag}")
          body = match.group("body").strip()
          if not body:
              raise SystemExit(f"CHANGELOG.md section for {tag} is empty")
          Path("release-notes.md").write_text(body + "\n", encoding="utf-8")
          PY

          echo "release=true" >> "$GITHUB_OUTPUT"

      - name: Upload release notes
        if: steps.prepare.outputs.release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  preflight:
    name: Preflight
    runs-on: macos-latest
    needs: prepare
    if: needs.prepare.outputs.release == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build ${{ matrix.suffix }}
    needs:
      - prepare
      - preflight
    if: needs.prepare.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - suffix: macos-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build app bundle
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: scripts/bundle-menubar.sh

      - name: Self-test app bundle
        shell: bash
        run: |
          set -euo pipefail
          app="target/menubar/Prismux.app"
          helper="${app}/Contents/SharedSupport/bin/prismux"
          test -x "${app}/Contents/MacOS/Prismux"
          test -x "${helper}"
          scripts/audit-menubar-bundle.sh "${app}"
          "${helper}" --version
          PRISMUX_STATE_ROOT="${RUNNER_TEMP}/prismux-state" \
          CODEX_HOME="${RUNNER_TEMP}/codex-home" \
          CLAUDE_CONFIG_DIR="${RUNNER_TEMP}/claude-home" \
          "${helper}" status

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="Prismux-${{ needs.prepare.outputs.tag }}-${{ matrix.suffix }}"
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "target/menubar/Prismux.app" "dist/${artifact}.zip"
          unzip -q "dist/${artifact}.zip" -d "${RUNNER_TEMP}/prismux-unpack"
          unpacked_app="${RUNNER_TEMP}/prismux-unpack/Prismux.app"
          unpacked_helper="${unpacked_app}/Contents/SharedSupport/bin/prismux"
          test -x "${RUNNER_TEMP}/prismux-unpack/Prismux.app/Contents/MacOS/Prismux"
          test -x "${unpacked_helper}"
          scripts/audit-menubar-bundle.sh "${unpacked_app}"
          PRISMUX_STATE_ROOT="${RUNNER_TEMP}/prismux-unpack-state" \
          CODEX_HOME="${RUNNER_TEMP}/prismux-unpack-codex-home" \
          CLAUDE_CONFIG_DIR="${RUNNER_TEMP}/prismux-unpack-claude-home" \
          "${unpacked_helper}" status

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Prismux-${{ needs.prepare.outputs.tag }}-${{ matrix.suffix }}
          path: dist/Prismux-${{ needs.prepare.outputs.tag }}-${{ matrix.suffix }}.zip

  publish:
    name: Publish GitHub Release
    runs-on: macos-latest
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.release == 'true'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find release-artifacts -name '*.zip' -exec cp {} dist/ \;
          find release-artifacts -name 'release-notes.md' -exec cp {} release-notes.md \;
          (cd dist && shasum -a 256 *.zip > SHA256SUMS)

      - name: Create release
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ needs.prepare.outputs.tag }}" dist/* \
            --target "$GITHUB_SHA" \
            --title "${{ needs.prepare.outputs.tag }}" \
            --notes-file release-notes.md
