name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust / macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --locked

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  menubar:
    name: Menubar / macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build menubar
        run: scripts/build-menubar.sh

      - name: Bundle smoke
        run: scripts/bundle-menubar.sh
